<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>play-with-web-ui</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>

<body class="container">

    <h1 class="display-1">Play with Web UI</h1>
    <hr />
    <button id="top5-todos-btn" class="btn btn-dark">top-5 todos</button>
    <hr />
    <div id="progress-message"></div>
    <hr />
    <table class="table">
        <thead>
            <tr>
                <th>id</th>
                <th>title</th>
                <th>completed</th>
            </tr>
        </thead>
        <tbody id="todos-table-body">
            <!-- todo items will be inserted here -->
        </tbody>
    </table>
    <hr />

    <div class="row">
        <div class="col-6">
            <div class="card">
                <div class="card-header">Welcome</div>
                <div class="card-body">Welcome to Web UI world</div>
                <div class="card-footer">
                    <button class="btn btn-primary">greet-me</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./index.js"></script>


</body>

</html>
